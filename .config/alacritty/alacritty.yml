import:
  - /home/azmain/.config/alacritty/themes/solarized_dark.yaml

window:
  padding:
    x: 2
    y: 5

  class:
    # Application instance name
    instance: Alacritty
    # General application class
    general: Alacritty

  dimensions:
    columns: 175
    lines: 35
  opacity: 0.9
  decorations: full
scrolling:
  history: 50000
  multiplier: 3


  # Font configuration
font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    style: Bold
  italic:
    style: Italic
  bold_italic:
    style: Bold Italic
  size: 8.5

draw_bold_text_with_bright_colors: true

# Window title
title: Alacritty

cursor:
  style:
    shape: Block
    blinking: off
    blink_interval: 2

seclection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\\t" 
  save_to_clipboard: true 

mouse:
  hide_when_typing: true
  bindings: [{mouse = "Right", action = "Paste"}]
